syntax = "proto3";

package composer.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/timestamp.proto";
import "common/version.proto";
import "messages/message.proto";
import "messages/user_config.proto";
import "messages/dynamic_tool.proto";

option go_package = "github.com/llmmllab/proto/composer/v1;composerv1";
option java_package = "com.llmmllab.composer.v1";

// ExecuteWorkflowRequest requests workflow execution with streaming
// This combines workflow composition and execution into a single RPC call
message ExecuteWorkflowRequest {
    string user_id = 1;
    string workflow_type = 2;
    string model_name = 3;
    messages.UserConfig user_config = 4;
    messages.DynamicTool tools = 5;
    repeated messages.Message messages = 6;
}

// WorkflowEvent represents a workflow execution event
message WorkflowEvent {
    string event_type = 1;
    google.protobuf.Timestamp timestamp = 2;
    oneof payload {
        WorkflowStepStart step_start = 3;
        WorkflowStepComplete step_complete = 4;
        WorkflowError error = 5;
        WorkflowOutput output = 6;
    }
}

// WorkflowStepStart marks the start of a workflow step
message WorkflowStepStart {
    string step_name = 1;
    map<string, string> inputs = 2;
}

// WorkflowStepComplete marks the completion of a workflow step
message WorkflowStepComplete {
    string step_name = 1;
    map<string, string> outputs = 2;
    int64 duration_ms = 3;
}

// WorkflowError represents a workflow error
message WorkflowError {
    string message = 1;
    string error_code = 2;
    map<string, string> details = 3;
}

// WorkflowOutput represents workflow output
message WorkflowOutput {
    bytes data = 1;
    map<string, string> metadata = 2;
}

// ChatDelta represents a streaming delta response
message ChatDelta {
    string message_id = 1;
    string role = 2;
    string content = 3;
    map<string, string> metadata = 4;
}

// ChatResponseDelta represents a streaming delta response with metadata
message ChatResponseDelta {
    ChatDelta delta = 1;
    google.protobuf.Timestamp created_at = 2;
    repeated float context = 3;
    string finish_reason = 4;
    double total_duration = 5;
    double load_duration = 6;
    double prompt_eval_count = 7;
    double prompt_eval_duration = 8;
    double eval_count = 9;
    double eval_duration = 10;
    string processing = 11;
    string state = 12;
    string prev_state = 13;
}

// ChatResponseComplete represents a workflow completion response
message ChatResponseComplete {
    WorkflowComplete complete = 1;
    google.protobuf.Timestamp created_at = 2;
    repeated float context = 3;
    string finish_reason = 4;
    double total_duration = 5;
    double load_duration = 6;
}

// ChatResponse represents a streaming chat response
message ChatResponse {
    oneof response {
        ChatResponseDelta delta = 1;
        ChatResponseComplete complete = 2;
    }
}

// WorkflowComplete marks workflow completion
message WorkflowComplete {
    bytes output_data = 1;
    int64 duration_ms = 2;
}

// TodoItem represents a todo item
message TodoItem {
    string id = 1;
    string title = 2;
    bool completed = 3;
    int64 created_at = 4;
}


// GetWorkflowStatusRequest gets the status of a workflow
message GetWorkflowStatusRequest {
    string user_id = 1;
    string workflow_type = 2;
}

// GetWorkflowStatusResponse returns workflow status
message GetWorkflowStatusResponse {
    string user_id = 1;
    string workflow_type = 2;
    string status = 3;
    google.protobuf.Timestamp created_at = 4;
    google.protobuf.Timestamp completed_at = 5;
}

// ComposerService provides workflow composition and execution
service ComposerService {
    // ExecuteWorkflow composes and executes a workflow with streaming responses
    // This RPC combines workflow composition and execution into a single call
    rpc ExecuteWorkflow(ExecuteWorkflowRequest) returns (stream ChatResponse);

    // GetWorkflowStatus gets the status of a workflow
    rpc GetWorkflowStatus(GetWorkflowStatusRequest) returns (GetWorkflowStatusResponse);

    // HealthCheck checks service health
    rpc HealthCheck(common.v1.HealthCheckRequest) returns (common.v1.HealthCheckResponse);
}

// WorkflowBuilderService provides workflow builder operations
service WorkflowBuilderService {
    // ListWorkflowTypes lists available workflow types
    rpc ListWorkflowTypes(ListWorkflowTypesRequest) returns (ListWorkflowTypesResponse);

    // GetWorkflowSchema gets the schema for a workflow type
    rpc GetWorkflowSchema(GetWorkflowSchemaRequest) returns (WorkflowSchema);
}

message ListWorkflowTypesRequest {}
message ListWorkflowTypesResponse {
    repeated string workflow_types = 1;
}

message GetWorkflowSchemaRequest { string workflow_type = 1; }
message WorkflowSchema {
    string workflow_type = 1;
    string json_schema = 2;
    string description = 3;
}