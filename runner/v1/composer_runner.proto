syntax = "proto3";

package composer_runner.v1;

option go_package = "github.com/llmmllab/proto/runner/v1;runnerv1";
option java_package = "com.llmmllab.runner.v1";

import "google/api/field_behavior.proto";
import "google/protobuf/duration.proto";

// PipelineHandle represents a created pipeline
message PipelineHandle {
    string pipeline_id = 1 [(google.api.field_behavior) = REQUIRED];
    string model_name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
    bool is_cached = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ModelProfile defines model configuration
message ModelProfile {
    string model_name = 1 [(google.api.field_behavior) = REQUIRED];
    string provider = 2 [(google.api.field_behavior) = REQUIRED];
    string task_type = 3 [(google.api.field_behavior) = REQUIRED];
    map<string, string> model_config = 4;
    GPUConfig gpu_config = 5;
    ParameterOptimizationConfig optimization_config = 6;
}

// GPUConfig defines GPU-specific settings
message GPUConfig {
    int32 gpu_layers = 1 [(google.api.field_behavior) = REQUIRED];
    string main_gpu = 2;
    double gpu_memory_fraction = 3 [(google.api.field_behavior) = REQUIRED];
    bool flash_attn = 4;
}

// ParameterOptimizationConfig defines optimization settings
message ParameterOptimizationConfig {
    int32 batch_size = 1 [(google.api.field_behavior) = REQUIRED];
    int32 context_size = 2 [(google.api.field_behavior) = REQUIRED];
    int32 threads = 3 [(google.api.field_behavior) = REQUIRED];
    bool mlock = 4;
    bool mmap = 5;
}

// TokenChunk represents a chunk of generated tokens
message TokenChunk {
    string token = 1 [(google.api.field_behavior) = REQUIRED];
    int32 token_id = 2 [(google.api.field_behavior) = REQUIRED];
    double probability = 3;
    map<string, string> metadata = 4;
}

// PipelineEvent represents a pipeline execution event (streaming)
message PipelineEvent {
    oneof event {
        TokenChunk token_chunk = 1;
        PipelineComplete complete = 2;
        PipelineError error = 3;
    }
}

// PipelineComplete marks pipeline completion
message PipelineComplete {
    bytes output_data = 1 [(google.api.field_behavior) = REQUIRED];
    int64 duration_ms = 2 [(google.api.field_behavior) = REQUIRED];
}

// PipelineError represents a pipeline error
message PipelineError {
    string message = 1 [(google.api.field_behavior) = REQUIRED];
    string error_code = 2 [(google.api.field_behavior) = REQUIRED];
}

// ErrorMetadata provides additional context for errors
message ErrorMetadata {
    string error_type = 1;
    string resource_type = 2;
    string resource_id = 3;
    map<string, string> details = 4;
}

// ErrorDetails provides structured error information
message ErrorDetails {
    ErrorMetadata metadata = 1;
    repeated string suggested_actions = 2;
    string stack_trace = 3;
    int64 timestamp_ms = 4;
}

// StatusResponse provides a standardized error response for unary methods
message StatusResponse {
    bool success = 1 [(google.api.field_behavior) = REQUIRED];
    string message = 2;
    string error_code = 3;
    ErrorDetails error_details = 4;
}

// GenerateEmbeddingsRequest requests embedding generation
message GenerateEmbeddingsRequest {
    repeated string texts = 1 [(google.api.field_behavior) = REQUIRED];
    string model_name = 2;
    int32 dimension = 3;
}

// Embedding represents a single embedding vector
message Embedding {
    repeated float values = 1 [(google.api.field_behavior) = REQUIRED];
    int32 index = 2 [(google.api.field_behavior) = REQUIRED];
}

// GenerateEmbeddingsResponse returns embeddings
message GenerateEmbeddingsResponse {
    repeated Embedding embeddings = 1 [(google.api.field_behavior) = REQUIRED];
    int32 model_dimension = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// CacheStats represents pipeline cache statistics
message CacheStats {
    int32 total_pipelines = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
    int32 cached_pipelines = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
    int32 active_pipelines = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
    int64 total_memory_bytes = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
    int64 available_memory_bytes = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
    int64 cache_hits = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
    int64 cache_misses = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
    double hit_rate = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// CreatePipelineRequest requests pipeline creation
message CreatePipelineRequest {
    ModelProfile profile = 1 [(google.api.field_behavior) = REQUIRED];
    string priority = 2 [(google.api.field_behavior) = REQUIRED];
    string grammar_type = 3;
    map<string, string> metadata = 4;
}

// ExecutePipelineRequest requests pipeline execution
message ExecutePipelineRequest {
    string pipeline_id = 1 [(google.api.field_behavior) = REQUIRED];
    bytes input_data = 2 [(google.api.field_behavior) = REQUIRED];
    bool stream_output = 3;
}

// GetCacheStatsRequest requests cache statistics
message GetCacheStatsRequest {
    string pipeline_type = 1;
}

// EvictPipelineRequest requests pipeline eviction
message EvictPipelineRequest {
    string pipeline_id = 1 [(google.api.field_behavior) = REQUIRED];
    bool force = 2;
}

// EvictPipelineResponse returns eviction results
message EvictPipelineResponse {
    bool success = 1 [(google.api.field_behavior) = REQUIRED];
    string message = 2;
    int64 freed_memory_bytes = 3;
}

// RunnerService provides pipeline management and execution
service RunnerService {
    // CreatePipeline creates a new pipeline from profile
    rpc CreatePipeline(CreatePipelineRequest) returns (StatusResponse);

    // ExecutePipeline executes a pipeline with streaming output
    rpc ExecutePipeline(ExecutePipelineRequest) returns (stream PipelineEvent);

    // GenerateEmbeddings generates embeddings for texts
    rpc GenerateEmbeddings(GenerateEmbeddingsRequest) returns (StatusResponse);

    // GetCacheStats returns pipeline cache statistics
    rpc GetCacheStats(GetCacheStatsRequest) returns (CacheStats);

    // EvictPipeline evicts a pipeline from cache
    rpc EvictPipeline(EvictPipelineRequest) returns (StatusResponse);
}