syntax = "proto3";

package runner.v1;

import "common/timestamp.proto";
import "common/version.proto";
import "messages/model_profile.proto";

option go_package = "github.com/llmmllab/proto/runner/v1;runnerv1";
option java_package = "com.llmmllab.runner.v1";

// PipelineHandle represents a created pipeline
message PipelineHandle {
    string pipeline_id = 1;
    string model_name = 2;
    bool is_cached = 3;
}

// ParameterOptimizationConfig defines optimization settings
message ParameterOptimizationConfig {
    int32 batch_size = 1;
    int32 context_size = 2;
    int32 threads = 3;
    bool mlock = 4;
    bool mmap = 5;
}

// TokenChunk represents a chunk of generated tokens
message TokenChunk {
    string token = 1;
    int32 token_id = 2;
    double probability = 3;
    map<string, string> metadata = 4;
}

// PipelineEvent represents a pipeline execution event (streaming)
message PipelineEvent {
    oneof event {
        TokenChunk token_chunk = 1;
        PipelineComplete complete = 2;
        PipelineError error = 3;
    }
}

// PipelineComplete marks pipeline completion
message PipelineComplete {
    bytes output_data = 1;
    int64 duration_ms = 2;
}

// PipelineError represents a pipeline error
message PipelineError {
    string message = 1;
    string error_code = 2;
}

// ErrorMetadata provides additional context for errors
message ErrorMetadata {
    string error_type = 1;
    string resource_type = 2;
    string resource_id = 3;
    map<string, string> details = 4;
}

// ErrorDetails provides structured error information
message ErrorDetails {
    ErrorMetadata metadata = 1;
    repeated string suggested_actions = 2;
    string stack_trace = 3;
    int64 timestamp_ms = 4;
}

// StatusResponse provides a standardized response for operations
message StatusResponse {
    bool success = 1;
    string message = 2;
    string error_code = 3;
    ErrorDetails error_details = 4;
}

// GenerateEmbeddingsRequest requests embedding generation
message GenerateEmbeddingsRequest {
    repeated string texts = 1;
    string model_name = 2;
    int32 dimension = 3;
}

// Embedding represents a single embedding vector
message Embedding {
    repeated float values = 1;
    int32 index = 2;
}

// GenerateEmbeddingsResponse returns embeddings
message GenerateEmbeddingsResponse {
    repeated Embedding embeddings = 1;
    int32 model_dimension = 2;
}

// CacheStats represents pipeline cache statistics
message CacheStats {
    int32 total_pipelines = 1;
    int32 cached_pipelines = 2;
    int32 active_pipelines = 3;
    int64 total_memory_bytes = 4;
    int64 available_memory_bytes = 5;
    int64 cache_hits = 6;
    int64 cache_misses = 7;
    double hit_rate = 8;
}

// CreatePipelineRequest requests pipeline creation
message CreatePipelineRequest {
    messages.ModelProfile profile = 1;
    string priority = 2;
    string grammar_type = 3;
    map<string, string> metadata = 4;
}

// ExecutePipelineRequest requests pipeline execution
message ExecutePipelineRequest {
    string pipeline_id = 1;
    bytes input_data = 2;
    bool stream_output = 3;
}

// GetCacheStatsRequest requests cache statistics
message GetCacheStatsRequest {
    string pipeline_type = 1;
}

// EvictPipelineRequest requests pipeline eviction
message EvictPipelineRequest {
    string pipeline_id = 1;
    bool force = 2;
}

// EvictPipelineResponse returns eviction results
message EvictPipelineResponse {
    bool success = 1;
    string message = 2;
    int64 freed_memory_bytes = 3;
}

// PipelineInfo provides information about a pipeline
message PipelineInfo {
    string pipeline_id = 1;
    string model_name = 2;
    string pipeline_type = 3;
    bool is_cached = 4;
    int64 created_at = 5;
    int64 last_accessed = 6;
    int64 memory_bytes = 7;
}

// ListPipelinesRequest lists pipelines
message ListPipelinesRequest {
    string pipeline_type = 1;
    int32 limit = 2;
}

// ListPipelinesResponse returns a list of pipelines
message ListPipelinesResponse {
    repeated PipelineInfo pipelines = 1;
}

// RunnerService provides pipeline management and execution
service RunnerService {
    // CreatePipeline creates a new pipeline from profile
    rpc CreatePipeline(CreatePipelineRequest) returns (StatusResponse);

    // ExecutePipeline executes a pipeline with streaming output
    rpc ExecutePipeline(ExecutePipelineRequest) returns (stream PipelineEvent);

    // GenerateEmbeddings generates embeddings for texts
    rpc GenerateEmbeddings(GenerateEmbeddingsRequest) returns (StatusResponse);

    // GetCacheStats returns pipeline cache statistics
    rpc GetCacheStats(GetCacheStatsRequest) returns (CacheStats);

    // EvictPipeline evicts a pipeline from cache
    rpc EvictPipeline(EvictPipelineRequest) returns (StatusResponse);

    // ListPipelines lists all pipelines
    rpc ListPipelines(ListPipelinesRequest) returns (ListPipelinesResponse);

    // GetPipelineInfo gets information about a specific pipeline
    rpc GetPipelineInfo(GetPipelineInfoRequest) returns (PipelineInfo);

    // HealthCheck checks service health
    rpc HealthCheck(common.v1.HealthCheckRequest) returns (common.v1.HealthCheckResponse);
}

// Request message types
message GetPipelineInfoRequest {
    string pipeline_id = 1;
}

// ModelService provides model management operations
service ModelService {
    // ListModels lists available models
    rpc ListModels(ListModelsRequest) returns (ListModelsResponse);

    // LoadModel loads a model into memory
    rpc LoadModel(LoadModelRequest) returns (StatusResponse);

    // UnloadModel unloads a model from memory
    rpc UnloadModel(UnloadModelRequest) returns (StatusResponse);

    // GetModelInfo gets information about a model
    rpc GetModelInfo(GetModelInfoRequest) returns (ModelInfo);

    // GetModelList gets a list of available models
    rpc GetModelList(GetModelListRequest) returns (ModelList);
}

message ListModelsRequest {}
message ListModelsResponse {
    repeated ModelInfo models = 1;
}

message LoadModelRequest {
    string model_name = 1;
    messages.ModelProfile profile = 2;
}

message UnloadModelRequest {
    string model_name = 1;
}

message GetModelInfoRequest {
    string model_name = 1;
}

message ModelInfo {
    string model_name = 1;
    string provider = 2;
    string task_type = 3;
    bool is_loaded = 4;
    int64 memory_bytes = 5;
    common.v1.Timestamp loaded_at = 6;
}

message GetModelListRequest {}
message ModelList {
    repeated ModelInfo models = 1;
}